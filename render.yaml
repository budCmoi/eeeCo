version: "1"

previews:
  generation: off

services:
  - type: web
    name: eeeco
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node scripts/start-production.js
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_API_URL
        value: https://eeeco-backend.onrender.com/api
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://eeeco.onrender.com
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  - type: web
    name: eeeco-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: FRONTEND_URL
        value: https://eeeco.onrender.com
      - key: FRONTEND_URLS
        value: https://eeeco.onrender.com,https://eeeco-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: eeeco-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://eeeco-backend.onrender.com/api/auth/google/callback
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://eeeco.onrender.com/account?payment=success
      - key: STRIPE_CANCEL_URL
        value: https://eeeco.onrender.com/checkout
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: eeeco-db
    databaseName: eeeco
    user: eeeco_user
    plan: free
    postgresMajorVersion: "18"
    ipAllowList: []